<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../SingIn/singInStyle.css">
    <link rel="icon" type="image/png" href="../camus icon.png">
    <title>Camus - Sing In</title>
</head>

<body>

    <div id="singInBox">
        <img src="../camus icon.png" alt="Logo da Camus" id="imgLogo">

        <div id="usernameDiv" class="inputBox">
            <label for="username" id="usernameLabel">USERNAME</label>
            <input type="text" name="username" id="username">
        </div>

        <div id="emailDiv" class="inputBox">
            <label for="email" id="emailLabel">EMAIL</label>
            <input type="email" name="email" id="email">
        </div>

        <div id="passwordDiv" class="inputBox">
            <label for="password" id="passwordLabel">PASSWORD</label>
            <input type="text" name="password" id="password">
        </div>

        <div id="passwordConfDiv" class="inputBox">
            <label for="passwordConfirm" id="passwordConfirmLabel">PASSWORD CONFIRM</label>
            <input type="text" name="passwordConfirm" id="passwordConfirm">
        </div>

        <div id="lpr">
            <a href="../Login/loginIndex.html" id="loginPageLink">Login Page</a>
            <a href="#"><button id="CadB">Register</button></a>
        </div>
    </div>

</body>

</html>
